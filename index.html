<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sai Design Studio</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  background: #fff;
  color: #171717;
}

.hero {
  min-height: 90vh;
  position: relative;
  padding: 110px 80px;
}

.logo {
  font-size: 42px;
  font-weight: 500;
  letter-spacing: -2px;
}

.dot { color: #c83a32; }

.nav {
  position: absolute;
  top: 118px;
  right: 96px;
  display: flex;
  flex-direction: column;
  gap: 34px;
  font-size: 13px;
  color: #777;
  text-transform: uppercase;
  letter-spacing: .3px;
}

.intro {
  position: absolute;
  top: 315px;
  left: 185px;
  font-size: 14px;
  line-height: 2.1;
  color: #777;
  font-weight: 500;
}

.scroll {
  position: absolute;
  left: 80px;
  bottom: 95px;
  font-size: 15px;
  color: #777;
  line-height: 2.3;
  font-weight: 500;
}

.projects {
  padding: 110px 80px 180px;
}

.project-card {
  display: grid;
  grid-template-columns: 220px 1fr;
  column-gap: 60px;
  align-items: start;
  margin-bottom: 160px;
}

.project-info {
  padding-top: 8px;
  font-size: 14px;
  line-height: 1.6;
  color: #777;
}

.project-title {
  color: #333;
  font-weight: 600;
  letter-spacing: .4px;
  margin-bottom: 32px;
}

.project-meta {
  text-transform: none;
}

.project-image {
  height: 620px;
  background: #d8c4c2;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

@media (max-width: 768px) {
  .hero {
    min-height: 78vh;
    padding: 58px 28px;
  }

  .logo {
    font-size: 31px;
    letter-spacing: -1.5px;
  }

  .nav {
    top: auto;
    right: auto;
    left: 28px;
    bottom: 70px;
    gap: 18px;
    font-size: 12px;
  }

  .intro {
    top: 195px;
    left: 28px;
    font-size: 13px;
  }

  .scroll {
    display: none;
  }

  .projects {
    padding: 80px 28px 120px;
  }

  .project-card {
    grid-template-columns: 1fr;
    gap: 34px;
  }

  .project-image {
    height: 360px;
  }
}
</style>
</head>

<body>

<section class="hero">
  <div class="logo">Sai Design Studio<span class="dot">.</span></div>

  <nav class="nav">
    <div>Project</div>
    <div>Studio</div>
    <div>Contact</div>
  </nav>

  <div class="intro">
    Interior Architecture<br>
    Residential · Commercial
  </div>

  <div class="scroll">
    ↓<br>
    Selected Projects
  </div>
</section>

<section class="projects">
  <div class="project-card">
    <div class="project-info">
      <div class="project-title">AETHER DOGO</div>
      <div class="project-meta">
        Private Stay<br>
        Asan, Korea · 2026
      </div>
    </div>

    <div class="project-image">
      Coming Soon
    </div>
  </div>
</section>

</body>
</html>
