<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sai Design Studio</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", Arial, sans-serif;
  background: #f5f5f5;
  color: #160b0b;
}

.page {
  width: min(1440px, 100%);
  margin: 0 auto;
  background: #fff;
}

.hero {
  height: 100vh;
  min-height: 760px;
  position: relative;
  padding: 120px 80px;
}

.logo {
  font-size: 42px;
  letter-spacing: -2.2px;
  font-weight: 500;
}

.dot { color: #d63a2f; }

.nav {
  position: absolute;
  top: 125px;
  right: 96px;
  display: flex;
  flex-direction: column;
  gap: 38px;
  font-size: 14px;
  color: #777;
  text-transform: uppercase;
}

.intro {
  position: absolute;
  top: 330px;
  left: 185px;
  font-size: 14px;
  line-height: 2.2;
  color: #777;
  font-weight: 500;
}

.scroll {
  position: absolute;
  left: 80px;
  bottom: 160px;
  font-size: 15px;
  color: #777;
  line-height: 2.4;
  font-weight: 500;
}

.projects {
  min-height: 100vh;
  padding: 140px 80px 180px;
  background: #fff;
}

.project-card {
  display: grid;
  grid-template-columns: 220px 1fr;
  column-gap: 64px;
  align-items: start;
}

.project-info {
  font-size: 14px;
  color: #777;
  line-height: 1.5;
  font-weight: 500;
  padding-top: 10px;
}

.project-title {
  margin-bottom: 34px;
  text-transform: uppercase;
  color: #777;
}

.project-meta {
  text-transform: uppercase;
}

.image-placeholder {
  width: 100%;
  height: 620px;
  background: #d8c4c2;
}

@media (max-width: 768px) {
  .hero {
    padding: 60px 28px;
    min-height: 680px;
  }

  .logo {
    font-size: 32px;
    letter-spacing: -1.6px;
  }

  .nav {
    top: auto;
    right: auto;
    left: 28px;
    bottom: 80px;
    gap: 18px;
  }

  .intro {
    left: 28px;
    top: 210px;
  }

  .scroll {
    display: none;
  }

  .projects {
    padding: 80px 28px 120px;
  }

  .project-card {
    grid-template-columns: 1fr;
    gap: 40px;
  }

  .image-placeholder {
    height: 360px;
  }
}
</style>
</head>

<body>

<main class="page">

  <section class="hero">
    <div class="logo">Sai Design Studio<span class="dot">.</span></div>

    <nav class="nav">
      <div>Project</div>
      <div>Studio</div>
      <div>Contact</div>
    </nav>

    <div class="intro">
      Interior Architecture<br />
      Residential · Commercial
    </div>

    <div class="scroll">
      ↓<br />
      Selected Projects
    </div>
  </section>

  <section class="projects">
    <div class="project-card">
      <div class="project-info">
        <div class="project-title">AETHER DOGO</div>
        <div class="project-meta">
          Private Stay<br />
          Asan, Korea · 2026
        </div>
      </div>

      <div class="image-placeholder"></div>
    </div>
  </section>

</main>

</body>
</html>
